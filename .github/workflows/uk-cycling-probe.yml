name: UK Cycling Probe (manuell)

# Einmal-Lauf zur Volumen-/Dubletten-Messung: baut data/radsport-gb.json aus
# Cycling UK + Sportive.com mit Fuzzy-Dedup, schreibt Zahlen in die Run-Summary
# und laedt die JSON als Artifact hoch. Nur manuell.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Dependencies
        run: pip install requests beautifulsoup4 lxml
      - name: Build radsport-gb (Cycling UK + Sportive.com, dedup)
        run: |
          set -o pipefail
          python scripts/build_gb_probe.py 2>&1 | tee /tmp/gb.txt
          { echo '## radsport-gb (kombiniert + dedupliziert)'; echo '```'; cat /tmp/gb.txt; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
      - name: Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: radsport-gb
          path: data/radsport-gb.json
          retention-days: 7
