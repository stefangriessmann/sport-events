name: UK Cycling Probe (manuell)

# Einmal-Lauf zur Volumen-/Dubletten-Messung: scrapt Cycling UK,
# schreibt data/radsport-gb.json (als Artifact) und die Zahlen in die Run-Summary.
# Nur manuell – kein Schedule, kein Push auf Daten.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Scrape Cycling UK
        run: |
          set -o pipefail
          python scripts/scrapers/gb_cyclinguk.py 2>&1 | tee /tmp/uk_probe.txt
          {
            echo '## UK Cycling Probe – Ergebnis';
            echo '```';
            cat /tmp/uk_probe.txt;
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Artifact radsport-gb.json
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: radsport-gb
          path: data/radsport-gb.json
          retention-days: 7
