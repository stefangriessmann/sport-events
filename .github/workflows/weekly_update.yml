name: Weekly Data Update

on:
  schedule:
    - cron: '0 3 * * 1'   # Montags 03:00 UTC (≈ 05:00 deutsche Sommerzeit)
  workflow_dispatch:        # Manueller Trigger über GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Zum Pushen der data/*.json Dateien

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run scrapers → data/*.json
        run: python scripts/update_data.py
        working-directory: ${{ github.workspace }}

      - name: Update PLZ map → data/plz_map.json
        run: python scripts/build_plz_map.py || echo "PLZ map update skipped (network issue)"
        working-directory: ${{ github.workspace }}

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/radsport-de.json data/triathlon-de.json data/laufen-de.json data/swim-de.json data/meta.json
          git add data/plz_map.json || true   # optional – nur falls generiert
          git diff --staged --quiet || git commit -m "chore: weekly data update $(date +%Y-%m-%d)"
          git push

      - name: Ergebnis-Mail (Resend)
        if: always()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          STAND=$(python3 -c "import json;print(json.load(open('data/meta.json'))['stand'])" 2>/dev/null || echo '?')
          COUNTS=$(python3 -c "import json;c=json.load(open('data/meta.json'))['counts'];print('Rad %s, Tri %s, Lauf %s, Swim %s'%(c['rad'],c['tri'],c['lauf'],c['swim']))" 2>/dev/null || echo '?')
          RUN="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          python3 scripts/notify_resend.py \
            "[bockwurst.cc] Scraping ${{ job.status }} – Stand $STAND" \
            "Weekly Data Update: ${{ job.status }} · Stand: $STAND · Events: $COUNTS · Run: $RUN"
