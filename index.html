.stat-val { font-size: 1.5rem; font-weight: 800; color: #f97316; line-height: 1.1; }
.stat-val.sm { font-size: .95rem; line-height: 1.3; }
.stat-label { font-size: .7rem; color: #64748b; margin-top: 2px; }

/* Pills + Filters */
.type-pills { display: flex; gap: 6px; padding: 0 20px 10px; flex-wrap: wrap; }
.pill { padding: 4px 10px; border-radius: 20px; font-size: .73rem; font-weight: 700; cursor: pointer; border: 2px solid transparent; transition: all .12s; user-select: none; opacity: .4; }
.pill.active { border-color: #0f172a !important; opacity: 1; }
.filters { display: flex; gap: 10px; padding: 0 20px 12px; flex-wrap: wrap; align-items: center; }
.filter-group { display: flex; align-items: center; gap: 5px; }
label { font-size: .76rem; color: #64748b; white-space: nowrap; }
select, input[type=range] { background: white; color: #0f172a; border: 1px solid #cbd5e1; border-radius: 6px; padding: 5px 7px; font-size: .8rem; }
#dist-val { color: #f97316; font-weight: 700; font-size: .8rem; min-width: 46px; }

/* Table */
.table-wrap { padding: 0 20px 28px; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: .83rem; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
thead { background: #1e293b; color: #f8fafc; }
th { padding: 10px 12px; text-align: left; font-size: .7rem; text-transform: uppercase; letter-spacing: .06em; white-space: nowrap; }
td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f8fafc; }

/* Calendar */
.cal-wrap { padding: 0 20px 28px; }
.month-header { font-size: .82rem; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: .08em; padding: 14px 0 8px; border-bottom: 1px solid #e2e8f0; margin-bottom: 8px; }
.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 8px; padding-bottom: 4px; }
.card { background: white; border: 1px solid #e2e8f0; border-radius: 10px; padding: 13px 14px; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
.card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.card-title { font-weight: 600; font-size: .88rem; margin-top: 4px; }
.card-title a { color: #1e293b; text-decoration: none; }
.card-title a:hover { color: #f97316; }
.card-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; align-items: center; }

/* Bookmarks */
.star-btn { background: none; border: none; cursor: pointer; font-size: 1.05rem; padding: 2px; line-height: 1; transition: transform .1s; flex-shrink: 0; margin-top: 2px; }
.star-btn:hover { transform: scale(1.25); }
.empty-state { text-align: center; padding: 56px 20px; color: #94a3b8; font-size: .88rem; line-height: 1.6; }

/* Shared */
.badge { display: inline-block; padding: 3px 8px; border-radius: 5px; font-size: .69rem; font-weight: 700; white-space: nowrap; }
.event-link { color: #1e293b; text-decoration: none; font-weight: 600; }
.event-link:hover { color: #f97316; }
.km-tag { background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 4px; padding: 1px 5px; font-size: .69rem; color: #475569; font-weight: 600; }

.dist-fill { height: 4px; border-radius: 2px; background: #f97316; flex-shrink: 0; }
.dist-num { font-size: .73rem; color: #64748b; white-space: nowrap; }

.src-note { padding: 0 20px 16px; font-size: .72rem; color: #94a3b8; }

.snap-badge { display: inline-block; background: #fef3c7; color: #92400e; border-radius: 4px; padding: 1px 6px; font-size: .68rem; font-weight: 600; margin-left: 6px; }


/* Sport selector */
.sport-bar { display:flex; gap:8px; padding:12px 20px 6px; flex-wrap:wrap; border-bottom:1px solid #f1f5f9; background:white; }

function haversine(lat1,lon1,lat2,lon2) {
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return Math.round(R*2*Math.asin(Math.sqrt(a)));
}

// Restore saved PLZ
(function(){
  const saved = localStorage.getItem("user_plz");
  if(saved) {
    const lat=parseFloat(localStorage.getItem("user_lat")||"");
    const lon=parseFloat(localStorage.getItem("user_lon")||"");
    if(!isNaN(lat)&&!isNaN(lon)){
      userLat=lat; userLon=lon; plzLabel=saved;
      document.addEventListener("DOMContentLoaded",()=>{ document.getElementById("plz-f").value=saved; });
    }
  }
})();

function eventKm(e) {
  if(e.lat!=null&&e.lon!=null) return haversine(userLat,userLon,e.lat,e.lon);
  const g=STATE_GEO[e.lv];
  if(g) return haversine(userLat,userLon,g[0],g[1]);
  return e.km||999;
}

  status.textContent="⏳";
  try {
    const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(plz)}&format=json&limit=1`,
      {headers:{"User-Agent":"sport-events-chemnitz/2.0"}});
    const data=await r.json();
    if(data.length>0){
      userLat=parseFloat(data[0].lat);
      userLon=parseFloat(data[0].lon);
      plzLabel=plz;
      localStorage.setItem("user_plz",plz);
      localStorage.setItem("user_lat",userLat);
      localStorage.setItem("user_lon",userLon);
      const name=data[0].display_name.split(",")[0];
      status.textContent="✓ "+name;
      render();
    } else {
      status.textContent="⚠ nicht gefunden";
    }
  } catch(e){
    status.textContent="⚠ Fehler";
  }
}

// ── App state ─────────────────────────────────────────────────────────────────
let SPORT = 'rad';
let ALL = SNAPSHOT;
// Patch existing events: add country="DE" if missing (backward compat)
[...SNAPSHOT,...SWIM_SNAPSHOT,...TRI_SNAPSHOT,...LAUF_SNAPSHOT].forEach(e=>{if(!e.country)e.country="DE";});

let activeTypes = new Set(ALL.map(e=>e.art));
let maxDist = 400, selMonth = "", sortBy = "date", tab = "liste";
let bookmarks = new Set(JSON.parse(localStorage.getItem("rad_bm")||"[]"));

function saveBM() { localStorage.setItem("rad_bm",JSON.stringify([...bookmarks])); updateBMCnt(); }
function updateBMCnt() { const n=bookmarks.size; document.getElementById("bm-cnt").textContent=n?"("+n+")":""; }
function toggleBM(url, btn) {
  if(bookmarks.has(url)){bookmarks.delete(url);btn.textContent="☆";}
  else{bookmarks.add(url);btn.textContent="⭐";}
  saveBM(); if(tab==="merken") renderMerkliste();
  updateStats(getVis());
}
function starBtn(url) {
  return `<button class="star-btn" onclick="toggleBM('${url.replace(/'/g,"\\'")}',this)">${bookmarks.has(url)?"⭐":"☆"}</button>`;
}

function setSport(s, el) {
  SPORT = s;
  if(s==='rad') ALL=SNAPSHOT;
  else if(s==='swim') ALL=SWIM_SNAPSHOT;
  else if(s==='tri') ALL=TRI_SNAPSHOT;
  else if(s==='lauf') ALL=LAUF_SNAPSHOT;
  else ALL=[...SNAPSHOT,...SWIM_SNAPSHOT,...TRI_SNAPSHOT,...LAUF_SNAPSHOT].sort((a,b)=>a.date_iso.localeCompare(b.date_iso));
  activeTypes = new Set(ALL.map(e=>e.art));
  document.querySelectorAll(".sport-btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
  const labels = {rad:"🚴 Radsport Events",swim:"🏊 Freiwasser Events",tri:"🏊🚴🏃 Triathlon Events",lauf:"🏃 Lauf Events",all:"🏆 Sport Events – Chemnitz"};
  const subs  = {rad:"400 km um PLZ 09111 · Stand: 07.06.2026",swim:"Freiwasser Wettkämpfe · Stand: 10.06.2026",tri:"DTU-Kalender · Stand: 10.06.2026",lauf:"laufen.run · Stand: 10.06.2026",all:"Radsport · Schwimmen · Triathlon · Laufen · Stand: 10.06.2026"};
  document.getElementById("hdr-sport").textContent = labels[s];
  document.getElementById("hdr-sub").innerHTML = subs[s] + ' <span class="snap-badge">Snapshot</span>';
  buildPills(); render();
}

function buildPills() {
  const types=[...new Set(ALL.map(e=>e.art))];
  const c=document.getElementById("pills"); c.innerHTML="";
  types.forEach(t=>{
    const cfg=g(t); const p=document.createElement("div");
    p.className="pill active"; p.textContent=cfg.e+" "+cfg.l;
    p.style.background=cfg.bg; p.style.color=cfg.c;
    p.addEventListener("click",()=>{
      if(activeTypes.has(t)){activeTypes.delete(t);p.classList.remove("active");}
      else{activeTypes.add(t);p.classList.add("active");}
      render();
    }); c.appendChild(p);
  });
}

function getVis() {
  return ALL.filter(e=>activeTypes.has(e.art)&&eventKm(e)<=maxDist&&(!selMonth||e.date_iso.includes("-"+selMonth+"-")));
}
function srt(arr) {
  return [...arr].sort((a,b)=>sortBy==="date"?a.date_iso.localeCompare(b.date_iso):a.km-b.km);
}

function updateStats(v) {
  const today=new Date().toISOString().slice(0,10);
  const next=v.find(e=>e.date_iso>=today);
  let cd="";
  if(next){const d=Math.ceil((new Date(next.date_iso)-new Date(today))/86400000); cd=d<=0?"Heute!":d===1?"Morgen!":d+" Tage";}
  document.getElementById("stats").innerHTML=`
    <div class="stat"><div class="stat-val">${v.length}</div><div class="stat-label">Events</div></div>
    <div class="stat"><div class="stat-val">${v.filter(e=>eventKm(e)<=150).length}</div><div class="stat-label">≤ 150 km</div></div>
    ${next?`<div class="stat"><div class="stat-val sm">${cd}</div><div class="stat-label">${next.titel.slice(0,22)}${next.titel.length>22?"…":""}</div></div>`:""}
    <div class="stat"><div class="stat-val">${bookmarks.size}</div><div class="stat-label">⭐ Gemerkt</div></div>
  `;
}

function renderListe(v) {
  const tb=document.getElementById("evt-body"); tb.innerHTML="";
  v.forEach(e=>{
    const cfg=g(e.art); const we=e.wochentag==="Samstag"||e.wochentag==="Sonntag";
    const ekm=eventKm(e); const dp=Math.max(4,Math.round(ekm/800*100));
    const flag=COUNTRY_FLAG[e.country]||"";
    const sH=e.strecken?e.strecken.split("/").map(s=>`<span class="km-tag">${s}</span>`).join(""):"–";
    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td><span class="badge" style="background:${cfg.bg};color:${cfg.c}">${cfg.e} ${cfg.l}</span></td>
      <td><span class="wday ${we?"we":""}">${e.datum.split(", ")[0]}</span>${e.datum.split(", ")[1]||e.datum}</td>
      <td><div class="dist-bar"><div class="dist-fill" style="width:${dp}px"></div><span class="dist-num">~${ekm} km</span></div></td>
      <td><a class="event-link" href="${e.url}" target="_blank">${e.titel}</a>${flag?`<span class="country-badge">${flag}</span>`:""} ${e.serie?`<span class="serie-badge">${e.serie}</span>`:""}</td>
      <td><div style="display:flex;gap:3px;flex-wrap:wrap">${sH}</div></td>
      <td class="verein-sm">${e.verein} <span style="color:#94a3b8">(${e.lv})</span></td>
      <td>${starBtn(e.url)}</td>`;
    tb.appendChild(tr);
  });
  document.getElementById("evt-tbl").style.display=v.length?"table":"none";
  document.getElementById("no-res").style.display=v.length?"none":"block";
}

function renderKalender(v) {
  // pre-compute km per event for this render pass
  const body=document.getElementById("cal-body"); body.innerHTML="";
  if(!v.length){body.innerHTML='<div style="text-align:center;padding:44px;color:#94a3b8">Keine Events – Filter anpassen</div>';return;}
  const byM={};
  v.forEach(e=>{const m=e.date_iso.slice(5,7);(byM[m]=byM[m]||[]).push(e);});
  Object.keys(byM).sort().forEach(m=>{
    const year=byM[m][0].date_iso.slice(0,4);
    const grp=document.createElement("div");
    grp.innerHTML=`<div class="month-header">${MONTHS[parseInt(m)]} ${year}</div>`;
    const cards=document.createElement("div"); cards.className="cards";
    byM[m].forEach(e=>{
      const cfg=g(e.art); const we=e.wochentag==="Samstag"||e.wochentag==="Sonntag";
      const ekm=eventKm(e); const flag=COUNTRY_FLAG[e.country]||"";
      const sH=e.strecken?e.strecken.split("/").map(s=>`<span class="km-tag">${s}</span>`).join(""):"";
      const card=document.createElement("div"); card.className="card";
      card.innerHTML=`
        <div class="card-head">
          <div><span class="badge" style="background:${cfg.bg};color:${cfg.c};margin-bottom:4px;display:inline-block">${cfg.e} ${cfg.l}</span>${flag?` <span class="country-badge">${flag}</span>`:""}
          <div class="card-title"><a href="${e.url}" target="_blank">${e.titel}</a></div></div>
          ${starBtn(e.url)}
        </div>
        <div class="card-meta">
          <span style="font-size:.76rem;color:#64748b"><span class="wday ${we?"we":""}">${e.datum.split(", ")[0]}</span>${e.datum.split(", ")[1]||e.datum}</span>
          <span style="font-size:.73rem;color:#94a3b8">~${ekm} km</span>
        </div>
        ${sH?`<div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:6px">${sH}</div>`:""}
        ${e.verein?`<div style="font-size:.76rem;color:#94a3b8;margin-top:5px">${e.verein}</div>`:""}`;
      cards.appendChild(card);
    });
    grp.appendChild(cards); body.appendChild(grp);
  });
}

function renderMerkliste() {
  const body=document.getElementById("bm-body");
  const allData=[...SNAPSHOT,...SWIM_SNAPSHOT,...TRI_SNAPSHOT,...LAUF_SNAPSHOT];
  const bmd=allData.filter(e=>bookmarks.has(e.url)).sort((a,b)=>a.date_iso.localeCompare(b.date_iso));
  if(!bmd.length){body.innerHTML='<div class="empty-state">☆ Noch keine Events gemerkt.<br>Klick auf ☆ in der Liste oder im Kalender<br>um Events zu speichern.</div>';return;}
  body.innerHTML="";
  const wrap=document.createElement("div"); wrap.style.cssText="padding:0 20px 28px";
  const cards=document.createElement("div"); cards.className="cards";
  bmd.forEach(e=>{
    const cfg=g(e.art); const we=e.wochentag==="Samstag"||e.wochentag==="Sonntag";
    const ekm=eventKm(e); const flag=COUNTRY_FLAG[e.country]||"";
    const sH=e.strecken?e.strecken.split("/").map(s=>`<span class="km-tag">${s}</span>`).join(""):"";
    const card=document.createElement("div"); card.className="card";
    card.style.borderLeft=`3px solid ${cfg.c}`;
    card.innerHTML=`
      <div class="card-head">
        <div><span class="badge" style="background:${cfg.bg};color:${cfg.c};margin-bottom:4px;display:inline-block">${cfg.e} ${cfg.l}</span>${flag?` <span class="country-badge">${flag}</span>`:""}
        <div class="card-title"><a href="${e.url}" target="_blank">${e.titel}</a></div></div>
        ${starBtn(e.url)}
      </div>
      <div class="card-meta">
        <span style="font-size:.76rem;color:#64748b"><span class="wday ${we?"we":""}">${e.datum.split(", ")[0]}</span>${e.datum.split(", ")[1]||e.datum}</span>
        <span style="font-size:.73rem;color:#94a3b8">~${ekm} km</span>
      </div>
      ${sH?`<div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:6px">${sH}</div>`:""}
    `;
    cards.appendChild(card);
  });
  wrap.appendChild(cards); body.appendChild(wrap);
}

function render() {
  const v = srt(getVis());
  updateStats(getVis());
  if(tab==="liste") renderListe(v);
  else if(tab==="kalender") renderKalender(v);
  else renderMerkliste();
}

function switchTab(name, el) {
  tab=name;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active")); el.classList.add("active");
  ["liste","kalender","merken"].forEach(t=>document.getElementById("tab-"+t).style.display=t===name?"block":"none");
  render();
}

document.getElementById("dist-f").addEventListener("input",function(){maxDist=parseInt(this.value);document.getElementById("dist-val").textContent=maxDist+" km";render();});
document.getElementById("month-f").addEventListener("change",function(){selMonth=this.value;render();});
document.getElementById("sort-f").addEventListener("change",function(){sortBy=this.value;render();});
document.getElementById("plz-f").addEventListener("input",onPlzInput);

buildPills(); updateBMCnt(); render();
</script>
</body>
</html>
