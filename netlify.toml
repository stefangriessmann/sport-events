[functions]
  directory = "netlify/functions"

# Event Guide unter /event-guide erreichbar (Rewrite, kein Redirect)
[[redirects]]
  from = "/event-guide"
  to = "/index.html"
  status = 200

# Root → /event-guide weiterleiten (SEO: canonical ist /event-guide)
[[redirects]]
  from = "/"
  to = "/event-guide"
  status = 301
  force = true
